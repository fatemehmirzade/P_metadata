default_model: gpt-5.2
max_threads: 4

model_settings:
  gpt-5.2:
    reasoning:
      effort: medium
    text:
      verbosity: low

optimizer_config:
  enable_optimizer: true
  sample_size: 5
  validation_sample_size: 3
  optimizer_model: gpt-5.2
  optimizer_model_settings:
    reasoning:
      effort: medium
    text:
      verbosity: low

datasets:
  papers:
    type: file
    path: ./papers_dataset.json

operations:
  - name: extract_factor_values
    type: map
    model: gpt-5.2
    model_params:
      reasoning:
        effort: medium
      text:
        verbosity: low
    prompt: |
      You are extracting experimental factor values and perturbation metadata from proteomics research papers.

      Paper: {{ input.filename }}

      {% if input.abstract %}
      Abstract:
      """{{ input.abstract }}"""
      {% endif %}

      {% if input.methods %}
      Methods:
      """{{ input.methods }}"""
      {% endif %}

      {% if input.supplementary %}
      Supplementary Information:
      """{{ input.supplementary }}"""
      {% endif %}

      CRITICAL FIRST STEP - IDENTIFY PROTEOMICS SECTIONS:
      Before extracting any annotations, you MUST:
      1. Read through ALL sections of the paper (abstract, methods, results, figures, supplementary)
      2. Identify which parts describe PROTEOMICS or MASS SPECTROMETRY experiments
      3. Look for IMPLICIT proteomics indicators including:
         - Affinity purification followed by mass spectrometry (AP-MS)
         - Tandem affinity purification (TAP) - commonly used for MS
         - Protein purification workflows that precede MS analysis
         - Immunoprecipitation (IP) followed by MS
         - Pull-down assays analyzed by MS
         - References to MS in abstract even if methods don't explicitly mention it
      4. Extract annotations from these proteomics-specific sections
      5. IGNORE sections about non-MS techniques (western blot, microscopy, cell culture only)

      PROTEOMICS WORKFLOW DETECTION SIGNALS:
      - Direct mentions: "mass spectrometry", "MS", "LC-MS", "proteomics"
      - Affinity purification techniques: "TAP", "AP-MS", "pull-down MS"
      - Protein identification workflows followed by unspecified analysis (assume MS if in proteomics paper)
      - Abstract mentions proteomics while methods describe protein purification

      The annotations you extract must describe HOW THE PROTEOMICS PART OF THE STUDY WAS PERFORMED.
      If a paper contains multiple experiment types, focus exclusively on the proteomics/mass spectrometry workflow.

      Extract the following annotation types from proteomics sections only:

      - FactorValue: The names of study variables or experimental factors that define what differs
        between sample groups in the proteomics experiment. Extract only the factor names, not
        the individual values. If the paper has a single condition with no comparison, this may be empty.

      - Time: Broad time parameter describing when proteomics samples were collected or how long
        a biological treatment was applied. Do NOT extract LC gradient times, MS acquisition times,
        or reagent incubation durations from sample preparation protocols.

      - Temperature: Growth temperature of the samples or perturbation temperature applied as a
        biological condition in a differential study. Do NOT extract instrument temperatures,
        column oven temperatures, or reagent incubation temperatures from sample preparation protocols.

      - Compound: A chemical or small molecule applied to proteomics samples as a biological
        treatment or perturbation. Extract each compound and its concentration together as a single
        combined string if a concentration is stated in the text. If no concentration is stated,
        extract the compound name alone. If the same compound is used at multiple concentrations,
        extract each as a separate list item. Do NOT extract sample preparation reagents, LC solvents,
        MS calibrants, or isotopic/isobaric labeling reagents. Never extract an orphan concentration
        without its compound name.

      CRITICAL EXTRACTION RULES:

      PROTEOMICS-ONLY EXTRACTION (HIGHEST PRIORITY):

      A. PROTEOMICS SECTION IDENTIFICATION:
         - First, identify all sections that describe proteomics or mass spectrometry experiments
         - Extract annotations ONLY from these proteomics-specific sections
         - DO NOT extract from sections about non-MS techniques
         - ALLOW reasonable inference when abstract mentions proteomics but methods describe protein purification

      B. SAMPLE DIFFERENTIATION TEST:
         - Before extracting, ask: "Is this metadata important for differentiating between proteomics samples?"
         - If NO, do not extract it
         - Focus on metadata that distinguishes one proteomics sample from another

      C. UTILITY TEST:
         - Before extracting, ask: "Is this metadata trivial or useful?"
         - Do NOT extract typical values used commonly across most proteomics experiments
         - Focus on metadata that provides meaningful experimental context

      D. BALANCED ANNOTATION APPROACH:
         - Avoid being too liberal: Don't fill with useless metadata
         - Avoid being too conservative: Don't miss key differentiating metadata
         - Apply both tests (B and C) to achieve balance

      E. COMPREHENSIVE PROTEOMICS SECTION REVIEW:
         - Use ALL parts of the paper that discuss proteomics
         - Some critical information only appears in results or figure captions
         - Search thoroughly across all proteomics-relevant sections before finalizing extraction

      F. CONCISE EXTRACTION:
         - Extract ONLY the specific requested information, NOT entire sentences
         - Remove unnecessary context, articles, and explanatory phrases
         - Extract the minimal phrase that captures the annotation
         - Do NOT include surrounding text or full sentence structure

      1. SOURCE FIDELITY: Extract ONLY text that exists verbatim in the source material
         - MUST copy exact wording, spelling, and punctuation from the text
         - Do NOT paraphrase, rephrase, or reword anything
         - Do NOT standardize or normalize terminology
         - Extract the minimal necessary phrase, not full sentences

      2. NO HALLUCINATION: Do NOT generate or fabricate any information
         - Every extracted annotation MUST be traceable to the proteomics sections
         - If you cannot find it in the proteomics-relevant text, do NOT include it
         - Do NOT use your background knowledge to add information

      3. NO DUPLICATES: Extract each unique annotation only ONCE
         - If the same term appears multiple times, extract it only ONCE
         - Do NOT repeat the same annotation
         - Check for uniqueness before adding to the list

      4. FACTOR VALUE EXTRACTION RULES:
         - FactorValue captures the NAMES of experimental variables, not their specific values
         - Ask: "What differs between the sample groups in this proteomics experiment?"
         - Extract only factors that are systematically varied across proteomics samples
         - Do NOT extract factors that are constant across all samples
         - Do NOT extract technical factors such as instrument settings or LC parameters
         - If the paper has a single condition with no comparison, FactorValue may be empty

      5. TIME EXTRACTION RULES:
         - Extract time points at which proteomics samples were collected
         - Extract duration of biological treatments applied to proteomics samples
         - Include units exactly as written
         - Extract ALL time points in time-course experiments as separate list items
         - DO NOT extract LC gradient times, MS acquisition times, or incubation times
           for sample preparation reagents — those are protocol steps, not sample time metadata
         - Test: "Does this time point define WHEN samples were collected or WHAT biological
           condition was applied?" — if YES, extract. If it describes a protocol step duration, do NOT.

      6. TEMPERATURE EXTRACTION RULES:
         - Extract temperatures that define the experimental biological condition for proteomics samples
         - Include growth temperatures and temperatures applied as biological perturbations
         - Exclude column oven temperatures, MS source temperatures, centrifuge temperatures,
           and reagent incubation temperatures from sample preparation protocols
         - Test: "Does this temperature describe a biological condition applied to the sample,
           not a protocol or instrument step?" — if YES, extract
         - Extract with units and context exactly as written

      7. COMPOUND EXTRACTION RULES (CRITICAL):
         - Extract biologically relevant chemicals or small molecules applied as treatments or
           perturbations to samples that were then analyzed by MS
         - DO NOT extract sample preparation reagents, LC solvents, MS calibrants,
           isobaric labels, or isotopic labels
         - DO NOT extract compounds mentioned only in non-proteomics experimental sections
         - Verify the compound was applied to samples that were subsequently analyzed by MS
         - For each compound, check whether a concentration is stated in the same or nearby sentence
         - If a concentration is stated, extract the compound and its concentration together
           as a single string: the compound name as written followed by the concentration as written
         - If no concentration is stated, extract the compound name alone
         - If the same compound appears at multiple concentrations, extract each as a separate list item
         - Never extract a concentration without its compound name — orphan concentrations are forbidden
         - Units must be included exactly as written in the source

      8. VERIFY BEFORE EXTRACTION: Before extracting any annotation, verify:
         - Is this from a section describing proteomics/MS experiments?
         - Can you point to the exact location in the proteomics text where it appears?
         - Is it written exactly as you are extracting it?
         - Does it clearly match the annotation type definition?
         - Does it pass the sample differentiation test?
         - Does it pass the utility test?
         - Have I extracted only the essential information without full sentences?
         - If you cannot answer YES to all seven, do NOT extract it

      9. ACCURACY OVER COMPLETENESS:
         - When in doubt, do NOT extract
         - Better to miss information than extract incorrectly
         - Only extract when certain it matches the annotation type AND is from proteomics sections
         - Empty lists are PERFECTLY ACCEPTABLE if annotations are not found

      10. NO TEXT IN OUTPUT:
          - Return ONLY the JSON object with annotation lists
          - Do NOT include source text sections
          - Do NOT include explanations outside the JSON structure
          - Do NOT include document identifiers in output

      11. EMPTY RESULTS ARE OK:
          - If an annotation type is not found in the proteomics sections, return an empty list []
          - Do NOT attempt to fill in likely values
          - It is better to return [] than to extract incorrect information

      12. MENTAL VERIFICATION PROCESS:
          - For each potential extraction, mentally note:
            * Is this from a proteomics/mass spectrometry section of the paper?
            * Where exactly in the proteomics section is this stated?
            * Is this the exact wording from the source?
            * Have I removed unnecessary sentence structure and context?
            * Why does this qualify as this specific annotation type?
            * For Time: is this a sample collection or biological treatment time, not a protocol step duration?
            * For Temperature: is this a biological condition temperature, not instrument or protocol?
            * For Compound: is this a biological treatment, not a sample prep reagent?
            * For Compound: if a concentration exists nearby, is it included in the same extracted string?
            * For FactorValue: does this name a variable that differs between sample groups?
            * Does this help differentiate proteomics samples?
            * Is this useful metadata or trivial information?
          - Only include if you can clearly answer all relevant questions

      13. CONTEXT-BASED EXTRACTION:
          - Pay attention to section context
          - Some terms have different meanings in different contexts
          - Extract based on functional role in the proteomics workflow
          - Only extract from proteomics-relevant contexts

      Return ONLY a valid JSON object with lists of extracted values and no other text.
    output:
      schema:
        FactorValue: list[string]
        Time: list[string]
        Temperature: list[string]
        Compound: list[string]

pipeline:
  steps:
    - name: factor_values_pipeline
      input: papers
      operations:
        - extract_factor_values

  output:
    type: file
    path: ./output/factor_values_complete.json
    intermediate_dir: ./checkpoints